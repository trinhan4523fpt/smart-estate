app = "smartestate-api"
primary_region = "sin" # Singapore gần VN nhất

[build]
  dockerfile = "SmartEstate.Api/Dockerfile"

[env]
  ASPNETCORE_ENVIRONMENT = "Production"
  ASPNETCORE_URLS = "http://+:8080"

[[services]]
  internal_port = 8080
  protocol = "tcp"

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.http_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"
    method = "get"
    path = "/swagger"
    protocol = "http"

[[vm]]
  size = "shared-cpu-1x"
  memory = 512